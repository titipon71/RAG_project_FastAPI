services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-fastapi-app
    env_file:
      - .env
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:-mysql+asyncmy://rag:rag_password@host.docker.internal:3306/rag?charset=utf8mb4}
      REDIS_URL: ${APP_REDIS_URL:-redis://host.docker.internal:6379/0}
      USE_OPENROUTER: ${APP_USE_OPENROUTER:-true}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${APP_OPENROUTER_MODEL:-mistralai/ministral-3b-2512}
      OPENROUTER_CONTEXT_WINDOW: ${APP_OPENROUTER_CONTEXT_WINDOW:-131072}
      USE_GEMINI: ${APP_USE_GEMINI:-false}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./file_storage/uploads:/app/file_storage/uploads
      - ./file_storage/trash:/app/file_storage/trash
      - ./uploads:/app/uploads
      - ./trash:/app/trash
      - ./lancedb:/app/lancedb
    restart: unless-stopped
