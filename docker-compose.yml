services:
  # 1. Python Backend (FastAPI + LlamaIndex + EasyOCR)
  fastapi-app:
    build: 
      context: .
      dockerfile: Dockerfile.python # แยกชื่อไฟล์ Dockerfile สำหรับ Python
    container_name: fastapi_backend
    restart: always
    env_file:
      - .env.docker
    environment:
      # เชื่อมต่อไปยัง container ชื่อ 'db' และ 'redis'
      - DATABASE_URL=mysql+asyncmy://rag:${MYSQL_ROOT_PASSWORD}@db:3306/rag?charset=utf8mb4
      - REDIS_URL=redis://redis:6379/0
      - TRASH_DIR=/app/file_storage/trash
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./lancedb:/app/lancedb
      - ./file_storage:/app/file_storage
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 2. Redis Stack (ตามรูปที่คุณส่งมา)
  redis:
    image: redis/redis-stack:latest
    container_name: redis_stack
    restart: always
    ports:
      - "6379:6379"   # Redis Port
      - "8001:8001"   # Redis Insight (UI)
    networks:
      - app-network

  # 3. Web Server (PHP/Apache เดิมของคุณ)
  web:
    build:
      context: .
      dockerfile: Dockerfile # ใช้ไฟล์ที่คุณส่งมา (php:8.3.26-apache)
    image: php-web-app
    ports:
      - "80:80"
    volumes:
      - ./www:/var/www/html
    networks:
      - app-network

  # 4. Database Server (MySQL)
  db:
    image: mysql:8.4.3
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: rag
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: rag
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:                                          # ✅ เพิ่มตรงนี้
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-urag", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 5. phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:5.2.2
    depends_on:
      - db
    restart: always
    ports:
      - "9080:80"
    environment:
      PMA_HOST: db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: